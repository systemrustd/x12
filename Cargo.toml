[workspace]
members = [
    "crates/yserver",
    "crates/yserver-core",
    "crates/yserver-protocol",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
repository = ""

[workspace.dependencies]
yserver-core = { path = "crates/yserver-core" }
yserver-protocol = { path = "crates/yserver-protocol" }
log = "0.4"
env_logger = "0.11"
libc = "0.2"
drm = "0.15"
input = "0.10"
nix = { version = "0.31", features = ["event", "fs", "ioctl", "mman", "poll", "signal"] }
signal-hook = "0.4"
crossbeam-channel = "0.5"
