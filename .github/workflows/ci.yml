name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install packages needed for build
        run: sudo apt-get update && sudo apt-get install -y build-essential just gcc libseat-dev libxshmfence-dev libxkbcommon-dev libinput-dev glslc libudev-dev libfontconfig-dev xfonts-base xfonts-100dpi xfonts-75dpi
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable, nightly
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo +nightly fmt -- --check
      - name: Clippy
        # TODO: also enable `-W clippy::pedantic` once the existing pedantic
        # warnings are cleaned up in a follow-up pass.
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --locked
      - name: Run tests
        run: cargo test --all-targets --locked
