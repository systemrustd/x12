name: CI
on:
  # push:
  #   branches: [master]
  # pull_request:
  #   branches: [master]
  workflow_call:
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No system packages needed today: the workspace is pure Rust and the
      # host X11 backend speaks the wire protocol directly over a Unix
      # socket (no libxcb / libX11 link).
      # When integration tests land they will likely want `xvfb` to host
      # ynest and `x11-apps` / `xterm` as client fixtures — add an apt step
      # then.
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        # TODO: also enable `-W clippy::pedantic` once the existing pedantic
        # warnings (~180) are cleaned up in a follow-up pass.
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --locked
      - name: Run tests
        run: cargo test --all-targets --locked
